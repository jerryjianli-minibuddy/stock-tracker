<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stock-tracker</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title">stock-tracker</div>
    <div class="meta">
      <span id="last-updated" class="muted small">loading…</span>
      <a id="repo-link" href="https://github.com/jerryjianli/stock-tracker" target="_blank" rel="noopener">repo ↗</a>
      <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">☼</button>
    </div>
  </header>

  <div id="macro-banner" hidden></div>

  <nav id="tabs" aria-label="Views"></nav>

  <!-- Watchlist view -->
  <section id="view-watchlist" class="view active">
    <div class="controls watchlist-controls">
      <input id="search" type="search" placeholder="Search ticker or company…" autocomplete="off" autocapitalize="off" spellcheck="false">
      <label class="ctl">Filter
        <select id="rating-filter" aria-label="Rating filter">
          <option value="all">All ratings</option>
          <option value="strong">Strong only</option>
          <option value="strong_watch">Strong + Watch</option>
          <option value="hide_pass">Hide Pass</option>
        </select>
      </label>
    </div>
    <main id="watchlist-main">
      <div id="watchlist-table-wrap"></div>
      <div id="empty-watchlist" hidden>No tickers match.</div>
    </main>
  </section>

  <!-- Reports view -->
  <section id="view-reports" class="view" hidden>
    <main class="reports-main">
      <div id="reports-list"></div>
      <div id="empty-reports" hidden>
        No reports ingested yet. Drop a PDF or markdown file into <code>reports/</code> and run <code>/ingest</code> in a Claude Code session.
      </div>
    </main>
  </section>

  <!-- Macro view -->
  <section id="view-macro" class="view" hidden>
    <main class="macro-main">
      <div id="macro-detail"></div>
      <div id="sector-rotation"></div>
    </main>
  </section>

  <!-- Bottlenecks view -->
  <section id="view-bottlenecks" class="view" hidden>
    <main class="bottlenecks-main">
      <div id="bottlenecks-grid"></div>
      <div id="empty-bottlenecks" hidden>
        No bottlenecks documented yet. Ingest a report (<code>/ingest</code>) or hand-edit <code>data/bottlenecks.json</code>.
      </div>
    </main>
  </section>

  <!-- Glossary view -->
  <section id="view-glossary" class="view" hidden>
    <main class="glossary-main">
      <div class="glossary-controls">
        <input id="glossary-search" type="search" placeholder="Search terms…" autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>
      <div id="glossary-sections"></div>
      <div id="empty-glossary" hidden>No terms match.</div>
    </main>
  </section>

  <!-- Glossary popover modal -->
  <div id="glossary-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-labelledby="glossary-modal-title">
    <div class="modal-backdrop" data-close-glossary></div>
    <div class="modal-card" role="document">
      <header class="modal-header">
        <div class="modal-title-row">
          <h2 id="glossary-modal-title"></h2>
          <span id="glossary-modal-category" class="muted small"></span>
        </div>
        <button class="modal-close" aria-label="Close" data-close-glossary>✕</button>
      </header>
      <div id="glossary-modal-body"></div>
      <footer class="modal-footer">
        <a href="#" id="glossary-modal-fullview" class="modal-btn ghost">Open in Glossary tab →</a>
        <button class="modal-btn" data-close-glossary>Close</button>
      </footer>
    </div>
  </div>

  <!-- Rating reasoning modal -->
  <div id="rating-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-labelledby="rating-modal-title">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card" role="document">
      <header class="modal-header">
        <div class="modal-title-row">
          <h2 id="rating-modal-title"></h2>
          <span id="rating-modal-pill"></span>
        </div>
        <button class="modal-close" aria-label="Close" data-close-modal>✕</button>
      </header>
      <div id="rating-modal-body"></div>
      <footer class="modal-footer">
        <button id="rating-modal-copy" class="modal-btn">Copy override snippet</button>
        <button class="modal-btn ghost" data-close-modal>Close</button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
