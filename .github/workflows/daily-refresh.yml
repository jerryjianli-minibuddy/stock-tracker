name: daily-refresh

on:
  schedule:
    # Cron is in UTC. 22:00 UTC = 3:00pm PT (PDT) / 2:00pm PT (PST) —
    # both are post-close (US market closes 4pm ET = 1pm PT). Edit if
    # you want a different time.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

# GITHUB_TOKEN needs write access to push the refreshed JSON back.
permissions:
  contents: write

# Block this workflow from racing with manual-refresh on the same data.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync

      # ---- DAILY UPDATE CHAIN ----
      # 1. fetch_macro.py — VIX / F&G / Put-Call / Net Liquidity / DXY /
      #    HY OAS / SPY-200DMA + sector rotation. Reads the prior
      #    macro.json to preserve the rolling 30-day F&G + P/C history.
      #    `continue-on-error: true` because CNN's endpoint can intermittently
      #    block bots — we'd rather ship a refresh with stale macro than fail
      #    the whole job. The fetcher writes a visibly-broken state when it
      #    fails so the dashboard shows "— unavailable".
      - name: Fetch macro indicators
        run: uv run python scripts/fetch_macro.py
        continue-on-error: true

      # 2. refresh.py — per-ticker yfinance snapshots, history append,
      #    Mansfield RS, valuation multiples. Mirrors all data/*.json into
      #    docs/data/ for GitHub Pages.
      - name: Fetch ticker snapshots + history
        run: uv run python scripts/refresh.py

      # 3. synthesize_pillars.py — recompute 5-Pillar scores from fresh
      #    snapshots. Preserves manual founder-led flips (evidence prefix
      #    "Manual flip — …") and never touches binding_constraint_thesis.
      - name: Recompute pillar scores
        run: uv run python scripts/synthesize_pillars.py

      - name: Commit updated data (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # All three scripts write to /data/ (canonical) and /docs/data/
          # (Pages mirror). Commit only if something actually changed.
          if git diff --quiet -- data/ docs/data/; then
            echo "no data changes — nothing to commit"
            exit 0
          fi
          git add -A -- data/ docs/data/
          git commit -m "Daily refresh $(date -u +%Y-%m-%d) — macro + snapshots + pillars"
          git push
